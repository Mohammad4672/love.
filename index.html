<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إلى رُبى ❤️</title>

<style>
body{
margin:0;
font-family:Tahoma;
background:linear-gradient(180deg,#050814,#0b1a3a,#2a1b5a);
overflow:hidden;
color:white;
}

/* دخول سينمائي */
#welcome{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#0b1a3a,#050814);
z-index:9999;
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

#openBtn{
padding:22px 50px;
font-size:26px;
border:none;
border-radius:999px;
cursor:pointer;
background:rgba(255,255,255,.08);
color:white;
backdrop-filter:blur(15px);
box-shadow:0 0 50px rgba(255,105,180,.4);
transition:0.3s;
}

#openBtn:hover{
transform:scale(1.05);
box-shadow:0 0 70px rgba(255,105,180,.7);
}

/* الرسالة */
.card{
display:none;
max-width:850px;
margin:60px auto;
padding:40px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-radius:30px;
line-height:2.2;
text-align:center;
animation:showCard 2s ease forwards;
}

@keyframes showCard{
from{transform:translateY(40px);opacity:0}
to{transform:translateY(0);opacity:1}
}

h1{
margin-bottom:20px;
}

/* كتابة */
#text{
font-size:22px;
white-space:pre-wrap;
min-height:120px;
}

.cursor{
animation:blink .7s infinite;
}

@keyframes blink{50%{opacity:0}}

/* قلوب */
.heart{
position:fixed;
color:pink;
font-size:22px;
animation:floatUp 5s linear forwards;
pointer-events:none;
opacity:0.9;
}

@keyframes floatUp{
0%{transform:translateY(0) scale(1);opacity:1}
100%{transform:translateY(-900px) scale(1.6);opacity:0}
}
</style>
</head>

<body>

<!-- شاشة الدخول -->
<div id="welcome">
<button id="openBtn">💌 افتحي الرسالة</button>
</div>

<!-- الرسالة -->
<div class="card" id="card">
<h1>إلى رُبى ❤️</h1>
<div id="text"></div>
</div>

<!-- موسيقى -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const message = ` 

هالرسالة رح تكون أصعب رسالة بتقريها مني.

اليوم …
أنا عم اترك وراي نسخة مني كانت قريبة من كل شي اسمو “إنتِ”.

أنا مش عم بالغ،
ولا عم حاول أعمل لحظة درامية…
بس الحقيقة إنو وجودك بحياتي كان أكبر من ما كنت مستوعب وأنا معك وجودك هوّي احلى شعور بهالدنيا
رُبى ❤️

اليوم مش يوم عادي أبداً…

اليوم أنا مسافر،
واليوم فعليًا رح تبعد المسافة بيني وبينك أكتر من أي وقت قبل.

أنا ما عم فل من شعوري فيكي، بس عم فل من المكان.

كل شي حواليي رح يتغيّر،
الناس، الطرق، الأيام…
بس في شي واحد رح يضل ثابت معي حتى وأنا بعيد هو
إنتِ.

ما بعرف كيف أوصف الشعور بشكل كامل،
بس بعرف إنو رح يضل بالي معك واثرك رح يضل مرافقني وين ما كنت

اليوم وأنا عم جهّز حالي للسفر،
كان في لحظات صمت طويلة…
كلها كانت  إلك.

مش لأنو وداع،
بس لأنو إدراك إنو في شخص رح يصير أبعد جسديًا،
بس ما رح يطلع من قلبي.

إذا مرقت عليكي أيام فيها تعب أو ضيق،
بدي ياكِ تتذكري إنو في شخص بعيد،
وكل تفكيره فيكي انو تكوني بخير ومبسوطة ومرتاحة.

إنتِ كنتِ أمان، وراحة، وشعور حلو ما بيتنسي...

أنا رح صير بعيد…
وبعرف قديش المسافات صعبة،
وبعرف إنو الحياة أخدت كل واحد فينا بمكان،
بس رغم كل شي، في شعور جواتي تجاهك ما في شي بيقدر يغيّرو.

كل ما بتذكرك بتذكر قديش كنتِ شخص ترك أثر حلو بحياتي، أثر ما بينمحى،
حتى لو مرق العمر كله
وقديش وجودك  بيعمل فرق من دون ما تحسي.

أنا رايح اليوم…
والمسافة بينا رح تصير حقيقة، مش مجرد حكي.

بس قبل ما أمشي،
بدي قلك كل شي كان لازم ينقال من زمان…

إنتِ مش بس شخص عرفته،
إنتِ كنتِ الإحساس اللي خلّاني أفهم شو يعني اشتياق،
وشو يعني إنو وجود حدا يغيّر يومك من دون ما يعمل شي.

اليوم وأنا عم جهّز حالي للسفر،
كنت عم حاول كون قوي…
بس ما في قوة بتمنع القلب يوجع لما يبعد عن شي تعلّق فيه… 

أنا يمكن بفل جسديًا،
بس في جزء مني رح يضل واقف عندك،
ما رح يلحقني لا طيران ولا مسافة ولا وقت.

إذا يوم من الأيام حسّيتي بالوحدة،
أو حسّيتي إنو في شي ناقص ومش مفهوم،
تذكري انو محمد حدك حتى لو كان بعيد…

وإذا اشتقتي،
ما تكرهي هالاشتياق…
لأنو أنا كمان رح أكون مشتاق، بطريقة ما بتنعرف.

إنتِ مش شخص عادي مرق بحياتي.
إنتِ الشي الوحيد اللي كان يخلّي الأيام العادية إلها معنى

بس بدي ياكِ تضلّي بخير،
حتى لو أنا بعيد،

لأنو الصعب مش إنو نسافر…
الصعب إنو نبعد عن حدا كنا نحس إنو قريب من قلبنا أكتر من أي شي تاني.

وإذا الحياة فرّقتنا كتير…
تذكري إنو في شخص،
حتى وهو بعيد،
ما رح ينسى ولا لحظة كان فيها وجودك بيكفيه عن الدنيا كلها.

رُبى… 
اليوم أنا ما عم بفل بس من مكان…
أنا عم بفل من لحظة كانت بالنسبة إلي كل شي بدون ما انتبه.

يمكن ما حكيتلك كل شي بوقته،
ويمكن ضيّعت لحظات كنت لازم قول فيها أكتر…

إنتِ ما كنتي عابرة بحياتي.
إنتِ كنتي الشعور اللي خلّاني أعرف شو يعني قلب يدقّ لحدا بصدق.

اليوم وأنا عم طلع من هالمكان،
حاسس إني عم اترك وراي جزء مني…
مش مباني ولا شوارع…ولا رفقة…
بس ذكريات مرتبطة فيكي إنتِ.

اليوم أنا مسافر،
ومش بس مسافر من مكان…
أنا مسافر من لحظة كنت فيها قريب من كل شي حلو مرتبط فيكي.

ديري بالك عحالك يا رُبى ❤️
وإذا بكيتِ هلأ…
اعرفي إنو محمد،
مش قصده يوجعك، او يضايقك
بس كان صادق أكتر من ما كان لازم يكون
وضلك تذكري انو محمد ما رح يشيلك من قلبو..
ولو كنت بعيد انتِ رح تضلي اقرب من قلبي الي 
انتبهِ عحالك و عصحتك يا قلبي وانشالله بترجع بتجمعنا الحياة مرة تانية وبحبك كتيرررر❤️❤️
سامحيني💔`;

let i = 0;

function typeWriter(){
if(i < message.length){
document.getElementById("text").innerHTML =
message.substring(0,i+1) + '<span class="cursor">|</span>';
i++;
setTimeout(typeWriter,30);
}
}

/* قلوب متحركة */
function startHearts(){
setInterval(()=>{
const heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤️";
heart.style.left = Math.random()*100 + "vw";
heart.style.bottom = "-20px";
heart.style.fontSize = (18 + Math.random()*20) + "px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);
},250);
}

document.getElementById("openBtn").onclick = async ()=>{
try{
await document.getElementById("music").play();
}catch(e){}

document.getElementById("welcome").style.display="none";
document.getElementById("card").style.display="block";

typeWriter();
startHearts();
};
</script>

</body>
</html>
